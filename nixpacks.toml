[phases.setup]
nixPkgs = ["php82","php82Extensions.pdo","php82Extensions.pdo_mysql","php82Extensions.mbstring","php82Extensions.xml","php82Extensions.curl","php82Extensions.gd","composer"]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader","npm install","npm run build"]

[start]
cmd = "php artisan config:clear && php artisan cache:clear && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"